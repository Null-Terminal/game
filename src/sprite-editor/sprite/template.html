<div id="controls" class="box">
  <div class="quick-actions">
    <button title="Удалить спрайт" data-action="deleteCurrent">❌</button>
    <button title="Добавить новый спрайт" data-action="addNew">➕</button>
    <button title="Передвинуть спрайт влево" data-action="moveLeft">◀</button>
    <button title="Передвинуть спрайт вправо" data-action="moveRight">▶</button>
  </div>

  <div class="quick-actions">
    <button title="Скопировать размер со слайда слева" data-action="copyLeftSize">👈🏻</button>
    <button title="Скопировать размер со слайда справа" data-action="copyRightSize">👉🏻</button>
  </div>

  <div class="quick-actions">

  </div>

  <div class="box inputs">
    <div class="row">
      <label for="spriteId">Идентификатор</label>
      <input id="spriteId" data-action="setId">
    </div>

    <div class="row">
      <label for="animationDelay">Задержка в мс</label>
      <input id="animationDelay" type="number" value="100" data-action="setAnimationDelay">
    </div>

    <div class="row">
      <label for="x">X</label>
      <input id="x" type="number" data-action="setX">
    </div>

    <div class="row">
      <label for="y">Y</label>
      <input id="y" type="number" data-action="setY">
    </div>

    <div class="row">
      <label for="width">Ширина</label>
      <input id="width" type="number" data-action="setWidth">
    </div>

    <div class="row">
      <label for="height">Высота</label>
      <input id="height" type="number" data-action="setHeight">
    </div>
  </div>
</div>

<div id="sprite" class="sprite">
  <canvas id="sprite-canvas" class="sprite-canvas" tabindex="0"></canvas>
</div>
