<div id="controls" class="box">
  <div class="row">
    <button title="Играть" data-action="play">▶</button>
    <button title="Пауза" data-action="pause">⏸</button>
    <button title="Стоп" data-action="stop">⏹</button>

    <button title="Увеличить скорость" data-action="speedUp">⤴</button>
    <button title="Стандартная скорость" data-action="speedReset">〰️</button>
    <button title="Уменьшить скорость" data-action="speedDown">⤵</button>
  </div>

  <div class="row">
    <button title="Предыдущий спрайт" data-action="previousSprite">⏮</button>
    <button title="Обновить спрайт" data-action="reloadSprite">🔄</button>
    <button title="Следующий спрайт" data-action="nextSprite">⏭</button>
  </div>
</div>

<div class="box">
  <canvas id="player"></canvas>
</div>
