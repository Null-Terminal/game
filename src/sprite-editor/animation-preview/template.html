<div id="controls" class="box">
  <div class="row">
    <button data-action="play">▶</button>
    <button data-action="pause">⏸</button>
    <button data-action="stop">⏹</button>
    <button data-action="speedUp">⤴</button>
    <button data-action="speedDown">⤵</button>
  </div>

  <div class="row">
    <button data-action="previousSprite">⏮</button>
    <button data-action="nextSprite">⏭</button>
  </div>

  <div class="row">
    <label for="index">Номер спрайта</label>
    <input id="index">

    <label for="id">Идентификатор спрайта</label>
    <input id="id">
  </div>
</div>

<canvas id="player"></canvas>
