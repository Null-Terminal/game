<form id="settings">
  <fieldset>
    <legend>Добавление спрайта для нарезки</legend>

    <p>
      <label>
        Исходное изображение
        <input name="sprite" type="file" accept="image/*" required>
      </label>
    </p>

    <p>
      <label>
        Количество спрайтов
        <input name="length" type="number" value="8" required>
      </label>

      <label>
        Ширина одного спрайта
        <input name="width" type="number" value="400" required>
      </label>

      <label>
        Высота одного спрайта
        <input name="height" type="number" value="260" required>
      </label>
    </p>

    <p>
      <button data-action="addToGrid">Добавить в сетку</button>
      <button data-action="clearGrid">Очистить сетку</button>
    </p>
  </fieldset>

  <fieldset>
    <legend>Рендер конечного спрайта</legend>

    <p>
      <label>
        Имя файла
        <input name="name" value="merged" required>
      </label>

      <label>
        Расширение
        <select name="ext" required>
          <option value="png" selected>png</option>
          <option value="jpeg">jpeg</option>
        </select>
      </label>

      <button data-action="renderGrid">Рендерить спрайты</button>
    </p>
  </fieldset>
</form>

<div id="grid" class="grid">

</div>
