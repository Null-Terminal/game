<form id="settings">
  <p>
    <label>
      Изображение спрайта
      <input name="sprite" type="file" accept="image/*" required>
    </label>

    <label>
      Количество спрайтов
      <input name="length" type="number" value="8" required>
    </label>

    <label>
      Ширина одного спрайта
      <input name="width" type="number" value="400" required>
    </label>

    <label>
      Высота одного спрайта
      <input name="height" type="number" value="260" required>
    </label>
  </p>

  <p>
    <button type="submit" name="generate" data-action="addToGrid">Добавить в сетку</button>
    <button type="submit" name="render" data-action="renderGrid">Рендерить спрайты</button>
  </p>
</form>

<div id="grid" class="grid">

</div>
